<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>larp.lol</title>

<style>
    body {
        margin: 0;
        background: #0b0b0b;
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background:
            linear-gradient(#111 1px, transparent 1px),
            linear-gradient(90deg, #111 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.35;
        z-index: 0;
    }

    .wrapper {
        position: relative;
        text-align: center;
        z-index: 2;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 32px;
    }

    p {
        color: #555;
        margin-bottom: 25px;
    }

    .menu {
        position: relative;
        display: inline-block;
        transform: scale(0.75);
    }

    .arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 30px;
        opacity: 0.6;
    }

    .arrow.left { left: -50px; }
    .arrow.right { right: -50px; }

    .small {
        font-size: 11px;
        opacity: 0.7;
        margin-bottom: 8px;
    }

    .box {
        background: #6a1bb1;
        color: white;
        padding: 8px 50px;
        margin: 5px 0;
        font-size: 16px;
        font-weight: bold;
        box-shadow: inset 0 0 0 2px #3b0b66;
        transition: 0.15s;
    }

    .box:hover {
        background: #8a2be2;
        transform: scale(1.05);
    }

    /* NON-BUTTON TEXT ITEM */
    .text-item {
        padding: 8px 50px;
        margin: 5px 0;
        font-size: 16px;
        font-weight: bold;
        color: #ddd;
        opacity: 0.9;
    }

    .button-box {
        display: inline-block;
        border: 2px solid #fff;
        padding: 4px;
        margin: 10px 5px;
    }

    .button {
        display: inline-block;
        padding: 10px 20px;
        text-decoration: none;
        color: white;
        transition: 0.2s;
    }

    .button:hover {
        color: #cc33ff;
    }

</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

    <h1>Get Started</h1>

    <p>This is where the chaos starts</p>

    <!-- MENU -->
    <div class="menu">

        <div class="arrow left">&lt;</div>
        <div class="arrow right">&gt;</div>

        <div class="small">Returns you back to the main cast</div>

        <div class="box">Disconnect</div>

        <!-- FIXED LINE (NOT A BUTTON ANYMORE) -->
        <div class="text-item">larps.lol</div>

        <div class="box">Settings</div>
        <div class="box">Movement mods</div>
        <div class="box">Player mods</div>
        <div class="box">Other player mods</div>
        <div class="box">Item mods</div>
    </div>

    <!-- BUTTONS UNDER MENU -->
    <div>
        <div class="button-box">
            <a class="button" href="https://discord.gg/KPxcaseC74" target="_blank">
                Download
            </a>
        </div>

        <div class="button-box">
            <a class="button" href="index.html">
                Back
            </a>
        </div>
    </div>

</div>

</body>
</html>
