<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>larp.lol</title>

<style>
    body {
        margin: 0;
        background: #0b0b0b;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* fake game background grid */
    .bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background:
            linear-gradient(#111 1px, transparent 1px),
            linear-gradient(90deg, #111 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.4;
    }

    /* MENU WRAPPER */
    .menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    /* SIDE ARROWS */
    .arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: white;
        font-size: 40px;
        opacity: 0.6;
        user-select: none;
    }

    .arrow.left { left: -70px; }
    .arrow.right { right: -70px; }

    /* MENU BOXES */
    .box {
        background: #6a1bb1;
        color: white;
        padding: 10px 60px;
        margin: 6px 0;
        font-weight: bold;
        font-size: 18px;
        box-shadow: inset 0 0 0 2px #3b0b66;
        transition: 0.15s;
    }

    .box:hover {
        background: #8a2be2;
        transform: scale(1.05);
    }

    /* CATEGORY HEADER STYLE */
    .small {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 10px;
        color: white;
    }

</style>
</head>

<body>

<div class="bg"></div>

<div class="menu">

    <div class="arrow left">&lt;</div>
    <div class="arrow right">&gt;</div>

    <div class="small">Returns you back to the main cast</div>

    <div class="box">Disconnect</div>
    <div class="box">harmony67 [1]</div>
    <div class="box">Settings</div>

    <div class="box">Movement mods</div>
    <div class="box">Player mods</div>
    <div class="box">Other player mods</div>
    <div class="box">Item mods</div>

    <div class="box">Spawning</div>
    <div class="box">RPC</div>
    <div class="box">Misc</div>

</div>

</body>
</html>
