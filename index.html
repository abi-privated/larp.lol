<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>larp.lol</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a, #0a0a0a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #ccc;
        }

        header {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            letter-spacing: -2px;
        }

        .larp {
            color: #111;
        }

        .lol {
            color: #cc33ff;
            text-shadow:
                0 0 5px #cc33ff,
                0 0 10px #cc33ff,
                0 0 20px #cc33ff,
                0 0 40px #ff00ff;
        }

        p {
            font-size: 1.2rem;
            color: #444;
            margin: 20px 0 30px;
        }

        .button-box {
            display: inline-block;
            border: 2px solid #fff;
            padding: 4px;
        }

        .button {
            display: inline-block;
            padding: 12px 28px;
            background: transparent;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>
            <span class="larp">larp</span><span class="lol">.lol</span>
        </h1>

        <p>Welcome.</p>

        <div class="button-box">
            <a class="button" href="get-started.html">
                Get started
            </a>
        </div>
    </header>

    <footer>
        © 2026 larp.lol
    </footer>

</body>
</html>
